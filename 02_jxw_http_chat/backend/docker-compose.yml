services:
  jxw-app:
    build:
      context: .
    image: jxw-app:latest
    container_name: jxw-app
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
